<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Game Boy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gameboy">

    <header class="container-fluid">
        <nav class="navbar-custom d-flex justify-content-between align-items-center p-4">
            <div class="logo-container">
                <div class="logo-icon">🎮</div>
            </div>
            <ul class="nav-links-custom d-flex list-unstyled m-0">
                <li><a href="./index.html" class="active">Home</a></li>
                <li><a href="./games.html" class="active">Games</a></li> 
                <li><a href="./about.html" class="active">About Us</a></li>
                <li><a href="./contact.html" class="active">Contact</a></li>
            </ul>
            <button class="call-us-btn">Call Us</button>
        </nav>
    </header>

    <main class="container py-5">
        <div class="text-center mb-5">
            <span class="badge-get-in-touch">Get in Touch</span>
        </div>

        <div class="row align-items-center mb-4">
            <div class="col-md-6 text-center text-md-start">
                <h1 class="gameboy-logo-text">GAME BOY!</h1>
            </div>
            <div class="col-md-6">
                <p class="pixel-text">
                    Feel free to reach out us with any questions or project ideas. We are here to help!
                </p>
            </div>
        </div>

        <hr class="divider">

        <div class="row">
            <div class="col-md-6">
                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control gb-input" placeholder="Name">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control gb-input" placeholder="Email Address">
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control gb-input" placeholder="Subject">
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control gb-input" rows="4" placeholder="Message"></textarea>
                    </div>
                    <button type="submit" class="btn-send-message">Send Message</button>
                </form>
            </div>
        </div>

        <hr class="divider mt-5">
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
